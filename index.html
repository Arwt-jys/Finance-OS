<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance OS</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F5F0;--sf:#fff;--sf2:#F0EDE6;
  --ink:#1A1714;--ink2:#5C5650;--ink3:#A09890;
  --green:#2D5A3D;--red:#C0392B;--amber:#B7750D;
  --blue:#1B5FA8;--bl:#EBF3FC;--purple:#5B3FA8;--pl:#EEE8FC;
  --bd:rgba(26,23,20,.1);--bd2:rgba(26,23,20,.06);
  --r:12px;--mono:'IBM Plex Mono',monospace;--sans:'Sarabun',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:15px;overflow-x:hidden}
.panel{transition:opacity .22s ease}
.panel.fading{opacity:0;pointer-events:none}
.mnav{background:#0f0f0f;border-bottom:1px solid rgba(255,255,255,.07);padding:10px 18px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99}
.mnav-btn{background:rgba(255,255,255,.09);border:none;color:rgba(255,255,255,.75);
  width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:17px;
  display:flex;align-items:center;justify-content:center;transition:background .15s;user-select:none}
.mnav-btn:hover{background:rgba(255,255,255,.18)}
.mnav-btn:disabled{opacity:.2;cursor:default}
.mnav-center{display:flex;flex-direction:column;align-items:center;gap:5px}
.mnav-month{font-size:14px;font-weight:600;color:#fff}
.mnav-dots{display:flex;gap:6px}
.mnav-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.2);cursor:pointer;transition:all .2s}
.mnav-dot.on{background:#7de0a4;width:18px;border-radius:3px}
.hdr{background:var(--ink);color:#fff;padding:18px 18px 16px}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.hdr-lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:3px}
.hdr-ttl{font-size:20px;font-weight:600}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.35);margin-top:2px}
.hdr-bdg{font-size:10px;padding:3px 9px;border-radius:20px;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6)}
.hdr-empty{background:rgba(255,255,255,.05);border-radius:8px;padding:20px;text-align:center;color:rgba(255,255,255,.3);font-size:12px;line-height:1.7}
.hero{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(255,255,255,.1);border-radius:8px;overflow:hidden;margin-bottom:12px}
.hc{background:rgba(255,255,255,.06);padding:11px 14px}
.hc-l{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:4px}
.hc-a{font-family:var(--mono);font-size:16px;font-weight:500;color:#fff}
.hc-a.r{color:#ff8a7a}.hc-a.g{color:#7de0a4}.hc-a.p{color:#c4b0ff}
.hc-s{font-size:9px;color:rgba(255,255,255,.3);margin-top:1px}
.sv-bar{background:rgba(255,255,255,.07);border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:12px}
.sv-r{font-family:var(--mono);font-size:22px;font-weight:500;color:#7de0a4}
.sv-inf{flex:1}
.sv-l{font-size:13px;color:rgba(255,255,255,.7)}
.sv-s{font-size:10px;color:rgba(255,255,255,.35);margin-top:2px}
.prog{height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:8px;overflow:hidden}
.prog-f{height:100%;border-radius:2px;background:#7de0a4}
.assets{padding:14px 18px;background:var(--ink);border-top:1px solid rgba(255,255,255,.08)}
.asset-hdr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.asset-title{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.4)}
.asset-updated{font-size:9px;color:rgba(255,255,255,.2)}
.asset-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.asset-card{background:rgba(255,255,255,.06);border-radius:10px;padding:10px 12px}
.asset-lbl{font-size:10px;color:rgba(255,255,255,.45);margin-bottom:4px}
.asset-amt{font-family:var(--mono);font-size:14px;font-weight:500;color:#fff}
.asset-thb{font-family:var(--mono);font-size:11px;color:#7de0a4;margin-top:1px}
.asset-rate{font-size:9px;color:rgba(255,255,255,.3);margin-top:1px}
.asset-sub{font-size:10px;margin-top:3px;color:rgba(255,255,255,.35)}
.asset-sub.g{color:#7de0a4}
.liq-tag{display:inline-flex;align-items:center;font-size:9px;padding:2px 6px;border-radius:4px;margin-top:5px;font-weight:500}
.liq-high{background:rgba(45,160,80,.2);color:#7de0a4}
.liq-medium{background:rgba(183,117,13,.2);color:#fbbf24}
.liq-low{background:rgba(91,63,168,.2);color:#c4b0ff}
.liq-locked{background:rgba(192,57,43,.2);color:#ff8a7a}
.nw-box{margin-top:10px;background:rgba(255,255,255,.08);border-radius:8px;padding:12px 14px}
.nw-row{display:flex;justify-content:space-between;align-items:flex-end}
.nw-cell{display:flex;flex-direction:column;gap:2px}
.nw-cell-lbl{font-size:10px;color:rgba(255,255,255,.35)}
.nw-cell-val{font-family:var(--mono);font-size:14px}
.nw-total{font-family:var(--mono);font-size:20px;font-weight:500;color:#7de0a4}
.nw-delta{font-family:var(--mono);font-size:11px;margin-top:4px}
.nw-delta.up{color:#7de0a4}.nw-delta.dn{color:#ff8a7a}
.nw-breakdown{margin-top:8px;font-size:10px;color:rgba(255,255,255,.22);line-height:1.7}
.debt-card{margin-top:10px}
.main{padding:14px 16px;max-width:600px;margin:0 auto}
.sec{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);
  margin:18px 0 10px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:var(--bd)}
.tab-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:3px;margin-bottom:10px;
  background:var(--sf2);border-radius:10px;padding:3px}
.tb{padding:6px 2px;border:none;background:none;cursor:pointer;border-radius:7px;
  font-family:var(--sans);font-size:10.5px;font-weight:500;color:var(--ink3);transition:all .15s;text-align:center;line-height:1.35}
.tb.on{background:var(--sf);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.bsum{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
.br{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--bd2)}
.br:last-child{border-bottom:none}
.bl{font-size:12px;color:var(--ink2)}
.bv{display:flex;gap:12px;font-family:var(--mono);font-size:12px}
.bb{color:var(--ink3)}.ba{font-weight:500}
.ba.ov{color:var(--red)}.ba.ok{color:var(--green)}
.bd-v{font-size:10px}
.bd-v.ov{color:var(--red)}.bd-v.ok{color:var(--green)}
.bsum-hdr{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);
  margin-bottom:7px;display:flex;justify-content:space-between}
.cats{display:flex;flex-direction:column;gap:6px}
.cc{background:var(--sf);border:1px solid var(--bd);border-radius:10px;overflow:hidden;animation:fu .22s ease both}
.cc.on{border-color:var(--green)}
.cc-h{display:flex;align-items:center;gap:9px;padding:11px 13px;cursor:pointer}
.cc-i{font-size:17px;width:24px;text-align:center;flex-shrink:0}
.cc-inf{flex:1}
.cc-n{font-size:13px;font-weight:500;margin-bottom:3px}
.cc-bar{height:4px;background:var(--bd2);border-radius:2px;overflow:hidden}
.cc-f{height:100%;border-radius:2px}
.cc-f.e{background:var(--red)}.cc-f.o{background:var(--green)}.cc-f.s{background:var(--blue)}.cc-f.t{background:var(--purple)}
.cc-r{text-align:right;flex-shrink:0}
.cc-a{font-family:var(--mono);font-size:13px;font-weight:500}
.cc-a.e{color:var(--red)}.cc-a.o{color:var(--green)}.cc-a.s{color:var(--blue)}.cc-a.t{color:var(--purple)}
.cc-b{font-size:10px;color:var(--ink3);margin-top:2px}
.cc-b.ov{color:var(--red)}.cc-b.ok{color:var(--green)}.cc-b.sv{color:var(--blue)}.cc-b.tr{color:var(--purple)}
.cc-chv{font-size:9px;color:var(--ink3);transition:transform .2s;margin-left:6px;flex-shrink:0}
.cc.on .cc-chv{transform:rotate(180deg)}
.txl{display:none;padding:0 13px 11px;flex-direction:column;gap:3px}
.cc.on .txl{display:flex}
.tx-h{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);
  padding:3px 0 5px;border-bottom:1px solid var(--bd2);margin-bottom:2px;display:flex;justify-content:space-between}
.tx{display:flex;align-items:center;gap:7px;padding:5px 7px;background:var(--sf2);border-radius:6px}
.tx-d{font-family:var(--mono);font-size:10px;color:var(--ink3);min-width:36px}
.tx-n{font-size:12px;color:var(--ink2);flex:1}
.tx-a{font-family:var(--mono);font-size:12px;font-weight:500}
.tx-a.m{color:var(--red)}.tx-a.t{color:var(--purple)}
.tx-s{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:600;flex-shrink:0}
.tx-s.ktc{background:#FEF3C7;color:#92400E}
.tx-s.ktb{background:var(--bl);color:var(--blue)}
.tx-s.mv{background:var(--pl);color:var(--purple)}
.tx-note{font-size:11px;padding-top:6px;line-height:1.5}
.inc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.ir{display:flex;align-items:center;padding:10px 14px;gap:10px;border-bottom:1px solid var(--bd2)}
.ir:last-child{border-bottom:none}
.idot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.in{font-size:13px;flex:1}
.ia{font-family:var(--mono);font-size:13px;font-weight:500}
.chart-wrap{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:16px}
.chart-ttl{font-size:12px;font-weight:600;margin-bottom:2px}
.chart-sub{font-size:11px;color:var(--ink3);margin-bottom:14px}
.donut-wrap{position:relative;width:260px;height:260px;margin:0 auto;touch-action:none}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;width:100px;pointer-events:none}
.dc-lbl2{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px}
.dc-amt{font-family:var(--mono);font-size:17px;font-weight:500;color:var(--ink);line-height:1.2}
.dc-pct{font-family:var(--mono);font-size:12px;color:var(--green);margin-top:2px}
.dc-lbl{font-size:10px;color:var(--ink3);margin-top:3px}
.leg-sec-ttl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);padding:4px 8px 2px;margin-top:4px}
.cl-item{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:8px}
.cl-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.cl-dot.circle{border-radius:50%}
.cl-name{font-size:12px;flex:1}
.cl-amt{font-family:var(--mono);font-size:11px;color:var(--ink3)}
.cl-pct{font-family:var(--mono);font-size:11px;font-weight:600;min-width:42px;text-align:right}
.chart-note{font-size:10px;color:var(--ink3);margin-top:8px;padding-top:8px;border-top:1px solid var(--bd2);line-height:1.6}
.ins{background:var(--ink);color:#fff;border-radius:var(--r);padding:14px 16px}
.ins-l{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:8px}
.ins-t{font-size:13px;color:rgba(255,255,255,.8);line-height:1.7}
.ins-t strong{color:#fff}
.hi{display:inline-block;background:rgba(255,255,255,.12);border-radius:4px;padding:0 5px;font-family:var(--mono);font-size:12px}
.hi.r{background:rgba(255,100,80,.2);color:#ff8a7a}.hi.g{background:rgba(80,220,130,.15);color:#7de0a4}
.me-box{padding:40px 20px;text-align:center}
.me-icon{font-size:48px;margin-bottom:14px;opacity:.35}
.me-ttl{font-size:18px;font-weight:600;color:var(--ink3);margin-bottom:8px}
.me-sub{font-size:13px;color:var(--ink3);line-height:1.7}
.spacer{height:32px}
.flow-row{display:flex;align-items:center;gap:5px;margin-top:4px;flex-wrap:wrap}
.flow-chip{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600;white-space:nowrap}
.flow-pos{background:rgba(45,160,80,.2);color:#7de0a4}
.flow-neg{background:rgba(192,57,43,.2);color:#ff8a7a}
.flow-neu{background:rgba(160,152,144,.15);color:rgba(255,255,255,.3)}
.flow-lbl{font-size:9px;color:rgba(255,255,255,.28);line-height:1.4}
.risk-tag{font-size:9px;padding:2px 6px;border-radius:4px;display:inline-flex;align-items:center;gap:3px;margin-top:3px;font-weight:500}
.risk-low{background:rgba(45,160,80,.18);color:#7de0a4}
.risk-high{background:rgba(192,57,43,.2);color:#ff8a7a}
.goal-tag{font-size:9px;color:rgba(255,255,255,.3);margin-top:3px;line-height:1.5}
.fund-alloc{font-family:var(--mono);font-size:10px;color:#c4b0ff;margin-top:2px}
.alloc-box{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:10px 12px;margin-top:10px}
.alloc-title{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:7px}
.alloc-row{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:10px;color:rgba(255,255,255,.5)}
.alloc-pct{font-family:var(--mono);font-size:10px;font-weight:600;min-width:32px}
.alloc-bar-wrap{flex:1;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.alloc-bar{height:100%;border-radius:2px}
.fund-new{background:rgba(255,210,50,.08);border:1px solid rgba(255,210,50,.2);border-radius:10px;padding:10px 12px}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

<div class="mnav">
  <button class="mnav-btn" id="btn-prev">&#8249;</button>
  <div class="mnav-center">
    <div class="mnav-month" id="mnav-label">-</div>
    <div class="mnav-dots" id="mnav-dots"></div>
  </div>
  <button class="mnav-btn" id="btn-next">&#8250;</button>
</div>
<div id="hdr-panel" class="panel hdr"></div>
<div id="assets-panel" class="panel assets"></div>
<div id="main-panel" class="panel main"></div>

<script>
// ============================================================
// CONSTANTS & HELPERS
// ============================================================
var MONTH_TH = {'01':'มกราคม','02':'กุมภาพันธ์','03':'มีนาคม','04':'เมษายน',
  '05':'พฤษภาคม','06':'มิถุนายน','07':'กรกฎาคม','08':'สิงหาคม',
  '09':'กันยายน','10':'ตุลาคม','11':'พฤศจิกายน','12':'ธันวาคม'};

var LIQ = {
  high:  {cls:'liq-high',   label:'ถอนได้ทันที'},
  medium:{cls:'liq-medium', label:'ถอนได้ 1-3 วัน'},
  low:   {cls:'liq-low',    label:'เงื่อนไขเฉพาะ'},
  locked:{cls:'liq-locked', label:'Locked'},
};

function keyToLabel(key) {
  var p = key.split('-');
  return (MONTH_TH[p[1]] || p[1]) + ' ' + p[0];
}

function fmt(n) { return Math.round(n).toLocaleString(); }

function el(id) { return document.getElementById(id); }

function calcNetWorth(m) {
  if (!m) return null;
  var a = m.assets, r = m.rates;
  var usThb = Math.round(a.us.usd * r.usdThb);
  var michelinThb = Math.round(a.michelin.eur * r.eurThb);
  // Auto-calculate fund values from units × nav if available
  if (a.kfsmart && a.kfsmart.units && a.kfsmart.nav) {
    a.kfsmart.amt = Math.round(a.kfsmart.units * a.kfsmart.nav);
  }
  if (a.useq && a.useq.units && a.useq.nav) {
    a.useq.amt = Math.round(a.useq.units * a.useq.nav);
  }
  var kfsmartAmt = (a.kfsmart && a.kfsmart.amt) || 0;
  var useqAmt    = (a.useq    && a.useq.amt)    || 0;
  var total = a.emergency.amt + a.daily.amt + a.gold.amt + usThb + a.pvd.amt + michelinThb + a.sso.amt + kfsmartAmt + useqAmt;
  return { total:total, netWorth:total-m.debt.loan.total, usThb:usThb, michelinThb:michelinThb, kfsmartAmt:kfsmartAmt, useqAmt:useqAmt };
}

function assetCard(icon, label, primary, sub, liq, flowHtml) {
  flowHtml = flowHtml || '';
  return '<div class="asset-card">'
    + '<div class="asset-lbl">' + icon + ' ' + label + '</div>'
    + '<div class="asset-amt">' + primary + '</div>'
    + flowHtml
    + '<div class="asset-sub">' + sub + '</div>'
    + '<div class="liq-tag ' + LIQ[liq].cls + '">' + LIQ[liq].label + '</div>'
    + '</div>';
}

// Monthly flow badge: delta=number, label=description, sign forced for zero
function flowChip(delta, label) {
  if (delta === null || delta === undefined) return '';
  var cls, prefix;
  if (delta > 0)      { cls = 'flow-pos'; prefix = '+ '; }
  else if (delta < 0) { cls = 'flow-neg'; prefix = '- '; }
  else                { cls = 'flow-neu'; prefix = ''; }
  return '<div class="flow-row">'
    + '<span class="flow-chip ' + cls + '">' + prefix + fmt(Math.abs(delta)) + ' บาท</span>'
    + (label ? '<span class="flow-lbl">' + label + '</span>' : '')
    + '</div>';
}

// DATA
// ============================================================

    salaryDeduction:7893, deductionSub:'BIB 2,085 + PVD 2,956 + SS 875 + Tax 1,284 + กรอ. 693',
    netToKTB:38175,
    savingRate:71.3,
    savingDetail:'เหมียวจด 25,552 / 35,850',
    savingNote:'NET เข้า KTB 38,175 · รวมลงทุนทั้งหมด 31,468 บาท',
  },
  assets: {
    emergency:{amt:67016, note:'KTB Next Saving', liquidity:'high'},
    daily:    {amt:7429,  note:'กรุงไทย บัญชีหลัก', liquidity:'high'},
    gold:     {amt:25751, cost:23000, pct:11.96, liquidity:'medium'},
    us:       {usd:10071, pct:28.80, gain:2252, liquidity:'medium'},
    pvd:      {amt:175177,ytd:2.90, note:'ณ 15/05/2569 TISCO+UOBAM ตน.ปี 147,746', liquidity:'low'},
    michelin: {eur:5743.71,shares:189,price:30.390,date:'26/05/2026',liquidity:'locked'},
    sso:      {amt:40215, note:'ยอดชราภาพสะสม', liquidity:'low'},
    // ── กองทุนรวม (Dime App) — อัปเดต units + nav ทุกเดือน ──────────
    // amt จะคำนวณอัตโนมัติจาก units × nav
    kfsmart: {
      units:0, nav:0, amt:0, cost:0,
      fullName:'Krungsri Smart Fixed Income Fund-A',
      purpose:'ท่องเที่ยว / รถ', allocPct:20, risk:'1/8',
      platform:'Dime App', started:false, liquidity:'medium',
    },
    useq: {
      units:0, nav:0, amt:0, cost:0,
      fullName:'Principal US Equity Fund-A',
      purpose:'บ้าน (ระยะยาว)', allocPct:10, risk:'6/8',
      platform:'Dime App', started:false, liquidity:'medium',
    },
  },

// ============================================================
// STATE
// ============================================================
var currentIdx = 0;
var activeTab  = 'daily';
var _pending   = null;
var PANELS     = ['hdr-panel', 'assets-panel', 'main-panel'];

// ============================================================
// TRANSITIONS
// ============================================================
function fadeIn() {
  for (var i = 0; i < PANELS.length; i++) {
    el(PANELS[i]).classList.remove('fading');
  }
}

function changeMonth(dir) {
  var next = currentIdx + dir;
  if (next < 0 || next >= MONTHS_ORDER.length) return;
  clearTimeout(_pending);
  for (var i = 0; i < PANELS.length; i++) {
    el(PANELS[i]).classList.add('fading');
  }
  var targetIdx = next;
  _pending = setTimeout(function() {
    currentIdx = targetIdx;
    activeTab  = 'daily';
    renderAll();
    fadeIn();
  }, 200);
}

function jumpTo(idx) {
  if (idx === currentIdx) return;
  clearTimeout(_pending);
  for (var i = 0; i < PANELS.length; i++) {
    el(PANELS[i]).classList.add('fading');
  }
  var targetIdx = idx;
  _pending = setTimeout(function() {
    currentIdx = targetIdx;
    activeTab  = 'daily';
    renderAll();
    fadeIn();
  }, 200);
}

// ============================================================
// RENDER NAV
// ============================================================
function renderNav() {
  var key = MONTHS_ORDER[currentIdx];
  el('mnav-label').textContent = keyToLabel(key);
  el('btn-prev').disabled = (currentIdx === 0);
  el('btn-next').disabled = (currentIdx === MONTHS_ORDER.length - 1);

  var dotsEl = el('mnav-dots');
  var html = '';
  for (var i = 0; i < MONTHS_ORDER.length; i++) {
    html += '<div class="mnav-dot' + (i === currentIdx ? ' on' : '') + '" data-idx="' + i + '"></div>';
  }
  dotsEl.innerHTML = html;

  // Add click handlers to dots (no inline onclick)
  var dots = dotsEl.querySelectorAll('.mnav-dot');
  for (var j = 0; j < dots.length; j++) {
    (function(dot) {
      dot.addEventListener('click', function() {
        jumpTo(parseInt(dot.getAttribute('data-idx'), 10));
      });
    })(dots[j]);
  }
}

function renderAssets(m, key) {
  var panel = el('assets-panel');
  if (!m) {
    panel.innerHTML = '<div class="asset-hdr-row"><div class="asset-title">Net Worth Tracker</div></div>'
      + '<div style="text-align:center;padding:24px 0;color:rgba(255,255,255,.25);font-size:12px">ยังไม่มีข้อมูล</div>';
    return;
  }
  var a = m.assets, r = m.rates, d = m.debt;
  var nw = calcNetWorth(m);
  var usThb = nw.usThb;
  var michelinThb = nw.michelinThb;
  var mf = m.monthlyFlow || {};

  // New fund helper: build card for KFSMART / USEQ
  function fundCard(key, icon) {
    var f = a[key];
    if (!f) return '';
    var gain = f.cost > 0 ? f.amt - f.cost : 0;
    var gainPct = f.cost > 0 ? (gain / f.cost * 100).toFixed(2) : 0;
    var gainStr = f.cost > 0 ? (gain >= 0 ? '+ ' : '- ') + fmt(Math.abs(gain)) + ' (' + (gain >= 0 ? '+' : '') + gainPct + '%)' : '';
    var riskCls = parseFloat(f.risk) <= 2 ? 'risk-low' : 'risk-high';
    var flowH = mf[key] ? flowChip(mf[key].delta, mf[key].label) : '';

    if (!f.started || f.amt === 0) {
      return '<div class="asset-card fund-new">'
        + '<div class="asset-lbl">' + icon + ' ' + key.toUpperCase() + ' · Dime App</div>'
        + '<div style="font-size:10px;color:rgba(255,255,255,.4);margin:4px 0 2px">' + f.fullName + '</div>'
        + '<div class="asset-amt" style="color:rgba(255,255,255,.3);font-size:13px">เริ่ม มิ.ย. 2026</div>'
        + '<div class="fund-alloc">' + f.allocPct + '% of investable</div>'
        + '<div class="goal-tag">เป้าหมาย: ' + f.purpose + '</div>'
        + '<div class="risk-tag ' + riskCls + '">ความเสี่ยง ' + f.risk + '</div>'
        + '</div>';
    }
    return '<div class="asset-card">'
      + '<div class="asset-lbl">' + icon + ' ' + key.toUpperCase() + ' · Dime App</div>'
      + '<div style="font-size:10px;color:rgba(255,255,255,.4);margin-bottom:3px">' + f.fullName + '</div>'
      + '<div class="asset-amt">' + fmt(f.amt) + ' บาท</div>'
      + (gainStr ? '<div class="asset-sub ' + (gain >= 0 ? 'g' : '') + '">' + gainStr + '</div>' : '')
      + flowH
      + '<div class="fund-alloc">' + f.allocPct + '% investable · NAV ' + (f.nav || '-') + ' · ' + (f.units || 0) + ' หน่วย</div>'
      + '<div class="goal-tag">เป้าหมาย: ' + f.purpose + '</div>'
      + '<div class="risk-tag ' + riskCls + '">ความเสี่ยง ' + f.risk + '</div>'
      + '</div>';

  var prevKey = currentIdx > 0 ? MONTHS_ORDER[currentIdx - 1] : null;
  var prevM   = prevKey ? MONTHS[prevKey] : null;
  var prevNW  = prevM ? calcNetWorth(prevM) : null;

    var delta = nw.netWorth - prevNW.netWorth;

      + (delta >= 0 ? '&#8593;' : '&#8595;') + ' ' + fmt(Math.abs(delta)) + ' บาท vs ' + keyToLabel(prevKey)
      + '</div>';

  var dailyFlow = '';
  if (mf.daily) {
    dailyFlow = '<div class="flow-row" style="margin-top:4px">'
      + '<span class="flow-lbl">รับ ' + fmt(mf.daily.recv) + ' · จ่าย ' + fmt(mf.daily.spent) + ' · ย้าย ' + fmt(mf.daily.xfer) + '</span>'

    + assetCard('🏦', 'เงินสำรองฉุกเฉิน', fmt(a.emergency.amt) + ' บาท', a.emergency.note, 'high',

        'ต้นทุน ' + fmt(a.gold.cost) + ' · กำไร +' + fmt(a.gold.amt - a.gold.cost), 'medium',
        mf.gold ? flowChip(mf.gold.delta, mf.gold.label) : '')

        a.pvd.note + ' YTD +' + a.pvd.ytd + '%', 'low',

function renderExpenses() {
  var key = MONTHS_ORDER[currentIdx];
  var m = MONTHS[key];
  if (!m) return;

  var Z = m.expenses;
  var d = Z[activeTab];
  if (!d) return;

  var tabRow = el('tab-row');
  if (tabRow) {
    var tabs = tabRow.querySelectorAll('.tb');
    for (var i = 0; i < tabs.length; i++) {
      var isActive = tabs[i].getAttribute('data-tab') === activeTab;
      tabs[i].className = 'tb' + (isActive ? ' on' : '');
    }
  }

  var bEl = el('bsum');
  var cEl = el('cats');
  if (!bEl || !cEl) return;

  // Summary box
  if (d.isTransfer) {
    bEl.innerHTML = '<div style="background:var(--pl);border:1px solid rgba(91,63,168,.2);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--purple);line-height:1.6">'
      + 'รายการย้ายเงิน ไม่นับเป็นรายจ่าย รวม <strong>' + fmt(d.total) + ' บาท</strong></div>';
  } else if (d.isSaving) {
    var totalAll = (d.totalKTB || 0) + (d.totalPayslip || 0);
    bEl.innerHTML = '<div style="background:var(--bl);border:1px solid rgba(27,95,168,.2);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--blue);line-height:1.8">'
      + '<strong>รวมลงทุนเดือนนี้ ' + fmt(totalAll) + ' บาท</strong><br>'
      + 'KTB (เหมียวจด): ทอง 2,000 + US ' + fmt((d.totalKTB || 0) - 2000) + ' = <strong>' + fmt(d.totalKTB || 0) + '</strong><br>'
      + 'สลิป (Employee): PVD 2,956 + BIB 2,085 + SSO 875 = <strong>' + fmt(d.totalPayslip || 0) + '</strong>'
      + '</div>';
  } else {
    var rows = [];
    for (var ri = 0; ri < d.srows.length; ri++) {
      if (d.srows[ri].a !== null) rows.push(d.srows[ri]);
    }
    var ov = d.actualTotal > d.budgetTotal;
    var diff = d.actualTotal - d.budgetTotal;
    var h = '<div class="bsum-hdr"><span>หมวด</span><span style="display:flex;gap:12px"><span>งบ</span><span>จริง</span><span>ส่วนต่าง</span></span></div>';
    for (var k = 0; k < rows.length; k++) {
      var rr = rows[k];
      var ro = rr.a > rr.b, df = rr.a - rr.b, cl = ro ? 'ov' : 'ok';
      h += '<div class="br"><span class="bl">' + rr.l + '</span><span class="bv"><span class="bb">' + fmt(rr.b) + '</span><span class="ba ' + cl + '">' + fmt(rr.a) + '</span><span class="bd-v ' + cl + '">' + (df > 0 ? '+' : '') + fmt(df) + '</span></span></div>';
    }
    var tc = ov ? 'ov' : 'ok';
    h += '<div class="br" style="padding-top:6px;border-top:1px solid var(--bd)"><span class="bl" style="font-weight:600">รวม</span><span class="bv"><span class="bb">' + fmt(d.budgetTotal) + '</span><span class="ba ' + tc + '">' + fmt(d.actualTotal) + '</span><span class="bd-v ' + tc + '">' + (diff > 0 ? '+' : '') + fmt(diff) + '</span></span></div>';
    if (d.note) h += '<div style="font-size:11px;color:var(--ink3);margin-top:8px;padding-top:6px;border-top:1px solid var(--bd2)">' + d.note + '</div>';
    bEl.innerHTML = h;
  }

  // Category cards
  cEl.innerHTML = '';
  for (var ci = 0; ci < d.cats.length; ci++) {
    var cat = d.cats[ci];
    var isSv = !!d.isSaving, isTr = !!d.isTransfer;
    var totalInv = isSv ? ((d.totalKTB || 0) + (d.totalPayslip || 0)) : 0;
    var pct = isSv ? (totalInv > 0 ? Math.round(cat.a / totalInv * 100) : 0)
            : isTr ? (cat.a / (d.total || 1) * 100)
            : (cat.b ? Math.min(cat.a / cat.b * 100, 100) : 0);
    var isOver = !isSv && !isTr && cat.a > (cat.b || 0);
    var amtCls = isTr ? 't' : (isSv ? 's' : (isOver ? 'e' : 'o'));
    var srcLabel = isSv ? (cat.src === 'KTB' ? 'KTB · ' : 'สลิป · ') : '';
    var biTxt = isTr ? (cat.note || '')
              : isSv ? (srcLabel + (totalInv > 0 ? Math.round(cat.a / totalInv * 100) + '% ของลงทุนรวม' : '-'))
              : (isOver ? 'เกินงบ +' + fmt(cat.a - (cat.b || 0)) : 'เหลือ ' + fmt((cat.b || 0) - cat.a));
    var biCls = isTr ? 'tr' : (isSv ? 'sv' : (isOver ? 'ov' : 'ok'));

    var txH = '';
    for (var txi = 0; txi < cat.t.length; txi++) {
      var tx = cat.t[txi];
      var txAmt = tx.a != null ? tx.a.toLocaleString() + ' บาท' : 'รอข้อมูล';
      var txBadge = tx.s === 'mv' ? 'ย้าย' : tx.s.toUpperCase();
      txH += '<div class="tx"><span class="tx-d">' + tx.d + '</span><span class="tx-n">' + tx.n + '</span>'
        + '<span class="tx-a ' + (tx.s === 'mv' ? 't' : 'm') + '">' + txAmt + '</span>'
        + '<span class="tx-s ' + tx.s + '">' + txBadge + '</span></div>';
    }
    var subH = cat.sub ? '<div class="tx-note" style="color:var(--ink3)">' + cat.sub + '</div>' : '';
    var dispAmt = cat.a ? fmt(Math.abs(cat.a)) : '-';

    var cc = document.createElement('div');
    cc.className = 'cc';
    cc.style.animationDelay = (ci * 0.05) + 's';
    cc.innerHTML = '<div class="cc-h">'
      + '<span class="cc-i">' + cat.i + '</span>'
      + '<div class="cc-inf"><div class="cc-n">' + cat.n + '</div>'
      + '<div class="cc-bar"><div class="cc-f ' + cat.f + '" style="width:' + pct + '%"></div></div></div>'
      + '<div class="cc-r"><div class="cc-a ' + amtCls + '">' + dispAmt + '</div><div class="cc-b ' + biCls + '">' + biTxt + '</div></div>'
      + '<span class="cc-chv">&#9660;</span></div>'
      + '<div class="txl"><div class="tx-h"><span>วันที่ · รายการ</span><span>แหล่ง</span></div>' + txH + subH + '</div>';

    // Use addEventListener (no inline onclick)
    var header = cc.querySelector('.cc-h');
    header.addEventListener('click', function(e) {
      e.currentTarget.parentElement.classList.toggle('on');
    });

    cEl.appendChild(cc);
  }

// ============================================================
// DONUT CHART — no inline event handlers
// ============================================================
var _donutKey = null; // track which month donut belongs to

function rstD() {
  var m = MONTHS[MONTHS_ORDER[currentIdx]];
  var dcAmt = el('dc-amt');
  if (!m || !dcAmt) return;
  el('dc-lbl2').textContent = 'รายได้รวม';
  dcAmt.textContent = fmt(m.chart.incomeRef);
  el('dc-pct').textContent = '';
  el('dc-lbl').textContent = 'บาท/เดือน';
}

function buildDonut() {
  var key = MONTHS_ORDER[currentIdx];
  var m = MONTHS[key];
  if (!m) return;
  var ch = m.chart;
  var svg = el('donut');
  var leg = el('cleg');
  if (!svg || !leg) return;

  _donutKey = key;

  var cx = 130, cy = 130;
  var RA = 122, RAsw = 12;
  var RB = 103, RBsw = 24;
  var RC = 74,  RCsw = 18;
  var CA = 2 * Math.PI * RA;
  var CB = 2 * Math.PI * RB;
  var CC = 2 * Math.PI * RC;
  var incRef = ch.incomeRef;
  var zoneTotal = 0;
  for (var zi = 0; zi < ch.zones.length; zi++) zoneTotal += ch.zones[zi].amt;

  var paths = '';
  var offA = 0, offB = 0;

  // Ring A — income sources (data-type="income" data-si=N)
  for (var si = 0; si < ch.incomeSources.length; si++) {
    var src = ch.incomeSources[si];
    var lenA = src.amt / incRef * CA;
    paths += '<circle cx="' + cx + '" cy="' + cy + '" r="' + RA + '" fill="none"'
      + ' stroke="' + src.c + '" stroke-width="' + RAsw + '"'
      + ' stroke-dasharray="' + (lenA - 1.5) + ' ' + (CA - (lenA - 1.5)) + '"'
      + ' stroke-dashoffset="' + (-offA) + '" style="cursor:pointer"'
      + ' data-type="income" data-si="' + si + '"/>';
    offA += lenA;
  }

  // Ring B — zones + Ring C — subs
  for (var zi2 = 0; zi2 < ch.zones.length; zi2++) {
    var zone = ch.zones[zi2];
    var zFrac = zone.amt / zoneTotal;
    var zLenB = zFrac * CB;
    paths += '<circle cx="' + cx + '" cy="' + cy + '" r="' + RB + '" fill="none"'
      + ' stroke="' + zone.c + '" stroke-width="' + RBsw + '"'
      + ' stroke-dasharray="' + (zLenB - 2) + ' ' + (CB - (zLenB - 2)) + '"'
      + ' stroke-dashoffset="' + (-offB) + '" style="cursor:pointer"'
      + ' data-type="zone" data-zi="' + zi2 + '"/>';

    var subTotal = 0;
    for (var s = 0; s < zone.subs.length; s++) subTotal += zone.subs[s].a;
    var offC = offB / CB * CC;
    for (var si2 = 0; si2 < zone.subs.length; si2++) {
      var sub = zone.subs[si2];
      var sLen = (sub.a / subTotal) * zFrac * CC;
      paths += '<circle cx="' + cx + '" cy="' + cy + '" r="' + RC + '" fill="none"'
        + ' stroke="' + sub.c + '" stroke-width="' + RCsw + '"'
        + ' stroke-dasharray="' + (sLen - 1) + ' ' + (CC - (sLen - 1)) + '"'
        + ' stroke-dashoffset="' + (-offC) + '" style="cursor:pointer"'
        + ' data-type="sub" data-zi="' + zi2 + '" data-si2="' + si2 + '"/>';
      offC += sLen;
    }
    offB += zLenB;
  }

  // White center
  paths += '<circle cx="' + cx + '" cy="' + cy + '" r="' + (RC - RCsw / 2 - 3) + '" fill="white"/>';
  svg.innerHTML = paths;

  // Add event listeners to all circles (NO inline handlers)
  var circles = svg.querySelectorAll('circle[data-type]');
  for (var ci = 0; ci < circles.length; ci++) {
    (function(circle) {
      var type = circle.getAttribute('data-type');
      var ziIdx  = parseInt(circle.getAttribute('data-zi')  || '0', 10);
      var siIdx  = parseInt(circle.getAttribute('data-si')  || '0', 10);
      var si2Idx = parseInt(circle.getAttribute('data-si2') || '0', 10);

      function onEnter() {
        var cm = MONTHS[MONTHS_ORDER[currentIdx]];
        var dcAmt = el('dc-amt');
        if (!cm || !dcAmt) return;
        var ch2 = cm.chart;
        if (type === 'income') {
          var src2 = ch2.incomeSources[siIdx];
          el('dc-lbl2').textContent = 'รายได้';
          dcAmt.textContent = fmt(src2.amt);
          el('dc-pct').textContent = (src2.amt / ch2.incomeRef * 100).toFixed(1) + '%';
          el('dc-lbl').textContent = src2.name;
        } else if (type === 'zone') {
          var z2 = ch2.zones[ziIdx];
          el('dc-lbl2').textContent = 'การจัดสรร';
          dcAmt.textContent = fmt(z2.amt);
          el('dc-pct').textContent = (z2.amt / ch2.incomeRef * 100).toFixed(1) + '%';
          el('dc-lbl').textContent = z2.name;
        } else if (type === 'sub') {
          var sub2 = ch2.zones[ziIdx].subs[si2Idx];
          el('dc-lbl2').textContent = 'รายละเอียด';
          dcAmt.textContent = fmt(sub2.a);
          el('dc-pct').textContent = (sub2.a / ch2.incomeRef * 100).toFixed(1) + '%';
          el('dc-lbl').textContent = sub2.n;
        }
      }

      circle.addEventListener('mouseenter', onEnter);
      circle.addEventListener('mouseleave', rstD);
      circle.addEventListener('touchstart', function(e) {
        e.preventDefault();
        onEnter();
      }, {passive: false});
      circle.addEventListener('touchend', rstD, {passive: true});
    })(circles[ci]);
  }

  // Legend
  var legH = '<div class="leg-sec-ttl">รายได้ (วงแหวนนอก)</div>';
  for (var i = 0; i < ch.incomeSources.length; i++) {
    var s2 = ch.incomeSources[i];
    legH += '<div class="cl-item"><div class="cl-dot circle" style="background:' + s2.c + '"></div>'
      + '<span class="cl-name" style="color:var(--ink2)">' + s2.name + '</span>'
      + '<span class="cl-amt">' + fmt(s2.amt) + ' บาท</span>'
      + '<span class="cl-pct" style="color:var(--green)">' + (s2.amt / incRef * 100).toFixed(1) + '%</span></div>';
  }
  legH += '<div class="leg-sec-ttl" style="margin-top:6px">การจัดสรร (วงแหวนกลาง) % ของรายได้รวม</div>';
  for (var j = 0; j < ch.zones.length; j++) {
    var z3 = ch.zones[j];
    legH += '<div class="cl-item"><div class="cl-dot" style="background:' + z3.c + '"></div>'
      + '<span class="cl-name">' + z3.name + '</span>'
      + '<span class="cl-amt">' + fmt(z3.amt) + ' บาท</span>'
      + '<span class="cl-pct">' + (z3.amt / incRef * 100).toFixed(1) + '%</span></div>';
  }
  legH += '<div class="chart-note">* % จากรายได้รวม ' + fmt(incRef) + ' บาท</div>';
  leg.innerHTML = legH;
  rstD();
}

// ============================================================
// RENDER ALL
// ============================================================
function renderAll() {
  var key = MONTHS_ORDER[currentIdx];
  var m   = MONTHS[key];
  renderNav();
  renderHeader(m, key);
  renderAssets(m, key);
  renderMain(m, key);
}

// ============================================================
// EVENTS — keyboard + swipe
// ============================================================
el('btn-prev').addEventListener('click', function() { changeMonth(-1); });
el('btn-next').addEventListener('click', function() { changeMonth(1); });

document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft')  changeMonth(-1);
  if (e.key === 'ArrowRight') changeMonth(1);
});

var _tx = 0, _ty = 0;
document.addEventListener('touchstart', function(e) {
  _tx = e.touches[0].clientX;
  _ty = e.touches[0].clientY;
}, {passive: true});
document.addEventListener('touchend', function(e) {
  var dx = _tx - e.changedTouches[0].clientX;
  var dy = _ty - e.changedTouches[0].clientY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 55) changeMonth(dx > 0 ? 1 : -1);
}, {passive: true});

// ============================================================
// INIT
// ============================================================
renderAll();
</script>
