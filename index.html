<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance OS — Wootdy</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F5F0;--sf:#fff;--sf2:#F0EDE6;
  --ink:#1A1714;--ink2:#5C5650;--ink3:#A09890;
  --green:#2D5A3D;--gl:#E8F2EC;
  --red:#C0392B;--rl:#FDECEA;
  --amber:#B7750D;--al:#FEF6E4;
  --blue:#1B5FA8;--bl:#EBF3FC;
  --purple:#5B3FA8;--pl:#EEE8FC;
  --bd:rgba(26,23,20,.1);--bd2:rgba(26,23,20,.06);
  --r:12px;--mono:'IBM Plex Mono',monospace;--sans:'Sarabun',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:15px}

/* ── MONTH NAV ── */
.mnav{background:#111;border-bottom:1px solid rgba(255,255,255,.06);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99}
.mnav-btn{background:rgba(255,255,255,.08);border:none;color:rgba(255,255,255,.7);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.mnav-btn:hover{background:rgba(255,255,255,.16)}
.mnav-btn:disabled{opacity:.25;cursor:default}
.mnav-center{display:flex;flex-direction:column;align-items:center;gap:2px}
.mnav-month{font-size:14px;font-weight:600;color:#fff;letter-spacing:.01em}
.mnav-dots{display:flex;gap:5px}
.mnav-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.2);cursor:pointer;transition:background .15s}
.mnav-dot.on{background:#7de0a4}

/* ── HEADER ── */
.hdr{background:var(--ink);color:#fff;padding:18px 18px 16px}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.hdr-lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:3px}
.hdr-ttl{font-size:20px;font-weight:600}
.hdr-bdg{font-size:10px;padding:3px 9px;border-radius:20px;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6)}
.hero{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(255,255,255,.1);border-radius:8px;overflow:hidden;margin-bottom:12px}
.hc{background:rgba(255,255,255,.06);padding:11px 14px}
.hc-l{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:4px}
.hc-a{font-family:var(--mono);font-size:16px;font-weight:500;color:#fff}
.hc-a.r{color:#ff8a7a}.hc-a.g{color:#7de0a4}.hc-a.p{color:#c4b0ff}
.hc-s{font-size:9px;color:rgba(255,255,255,.3);margin-top:1px}
.sv-bar{background:rgba(255,255,255,.07);border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:12px}
.sv-r{font-family:var(--mono);font-size:22px;font-weight:500;color:#7de0a4}
.sv-inf{flex:1}
.sv-l{font-size:13px;color:rgba(255,255,255,.7)}
.sv-s{font-size:10px;color:rgba(255,255,255,.35);margin-top:2px}
.prog{height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:8px;overflow:hidden}
.prog-f{height:100%;border-radius:2px;background:#7de0a4;transition:width .6s ease}

/* ── ASSET PANEL ── */
.assets{padding:14px 18px;background:var(--ink);border-top:1px solid rgba(255,255,255,.08)}
.asset-title{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:10px}
.asset-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.asset-card{background:rgba(255,255,255,.06);border-radius:10px;padding:10px 12px}
.asset-lbl{font-size:10px;color:rgba(255,255,255,.45);margin-bottom:4px}
.asset-amt{font-family:var(--mono);font-size:14px;font-weight:500;color:#fff}
.asset-sub{font-size:10px;margin-top:3px}
.asset-sub.g{color:#7de0a4}.asset-sub.p{color:#c4b0ff}.asset-sub.dim{color:rgba(255,255,255,.35)}
.asset-na{font-family:var(--mono);font-size:13px;color:rgba(255,255,255,.2);font-style:italic}

/* ── EMPTY STATE ── */
.empty-state{padding:40px 20px;text-align:center}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.4}
.empty-ttl{font-size:16px;font-weight:600;color:rgba(255,255,255,.5);margin-bottom:6px}
.empty-sub{font-size:12px;color:rgba(255,255,255,.3);line-height:1.6}

/* ── MAIN ── */
.main{padding:14px 16px;max-width:600px;margin:0 auto}
.sec{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);margin:18px 0 10px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:var(--bd)}

.tab-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:3px;margin-bottom:10px;background:var(--sf2);border-radius:10px;padding:3px}
.tb{padding:6px 2px;border:none;background:none;cursor:pointer;border-radius:7px;font-family:var(--sans);font-size:10.5px;font-weight:500;color:var(--ink3);transition:all .15s;text-align:center;line-height:1.35}
.tb.on{background:var(--sf);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.08)}

.bsum{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
.br{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--bd2)}
.br:last-child{border-bottom:none}
.bl{font-size:12px;color:var(--ink2)}
.bv{display:flex;gap:12px;font-family:var(--mono);font-size:12px}
.bb{color:var(--ink3)}.ba{font-weight:500}
.ba.ov{color:var(--red)}.ba.ok{color:var(--green)}.ba.sv{color:var(--blue)}.ba.tr{color:var(--purple)}
.bd-v{font-size:10px}
.bd-v.ov{color:var(--red)}.bd-v.ok{color:var(--green)}.bd-v.sv{color:var(--blue)}
.bsum-hdr{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:7px;display:flex;justify-content:space-between}

.cats{display:flex;flex-direction:column;gap:6px}
.cc{background:var(--sf);border:1px solid var(--bd);border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color .15s;animation:fu .22s ease both}
.cc:hover{border-color:var(--ink3)}.cc.on{border-color:var(--green)}
.cc-h{display:flex;align-items:center;gap:9px;padding:11px 13px}
.cc-i{font-size:17px;width:24px;text-align:center;flex-shrink:0}
.cc-inf{flex:1}
.cc-n{font-size:13px;font-weight:500;margin-bottom:3px}
.cc-bar{height:4px;background:var(--bd2);border-radius:2px;overflow:hidden}
.cc-f{height:100%;border-radius:2px;transition:width .7s ease}
.cc-f.e{background:var(--red)}.cc-f.o{background:var(--green)}.cc-f.s{background:var(--blue)}.cc-f.t{background:var(--purple)}
.cc-r{text-align:right;flex-shrink:0}
.cc-a{font-family:var(--mono);font-size:13px;font-weight:500}
.cc-a.e{color:var(--red)}.cc-a.o{color:var(--green)}.cc-a.s{color:var(--blue)}.cc-a.t{color:var(--purple)}
.cc-b{font-size:10px;color:var(--ink3);margin-top:2px}
.cc-b.ov{color:var(--red)}.cc-b.ok{color:var(--green)}.cc-b.sv{color:var(--blue)}.cc-b.tr{color:var(--purple)}
.cc-chv{font-size:9px;color:var(--ink3);transition:transform .2s;margin-left:6px;flex-shrink:0}
.cc.on .cc-chv{transform:rotate(180deg)}
.txl{display:none;padding:0 13px 11px;flex-direction:column;gap:3px}
.cc.on .txl{display:flex}
.tx-h{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);padding:3px 0 5px;border-bottom:1px solid var(--bd2);margin-bottom:2px;display:flex;justify-content:space-between}
.tx{display:flex;align-items:center;gap:7px;padding:5px 7px;background:var(--sf2);border-radius:6px}
.tx-d{font-family:var(--mono);font-size:10px;color:var(--ink3);min-width:36px}
.tx-n{font-size:12px;color:var(--ink2);flex:1}
.tx-a{font-family:var(--mono);font-size:12px;font-weight:500}
.tx-a.m{color:var(--red)}.tx-a.t{color:var(--purple)}
.tx-s{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:600;flex-shrink:0}
.tx-s.ktc{background:#FEF3C7;color:#92400E}
.tx-s.ktb{background:var(--bl);color:var(--blue)}
.tx-s.mv{background:var(--pl);color:var(--purple)}
.tx-note{font-size:11px;padding-top:6px;line-height:1.5}

/* ── INCOME ── */
.inc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.ir{display:flex;align-items:center;padding:10px 14px;gap:10px;border-bottom:1px solid var(--bd2)}
.ir:last-child{border-bottom:none}
.idot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
.in{font-size:13px;flex:1}
.ia{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--green)}

/* ── CHART ── */
.chart-wrap{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:16px}
.chart-ttl{font-size:12px;font-weight:600;margin-bottom:2px}
.chart-sub{font-size:11px;color:var(--ink3);margin-bottom:12px}
.chart-body{display:flex;flex-direction:column;align-items:center}
.donut-wrap{position:relative;width:240px;height:240px;margin:0 auto}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
.dc-amt{font-family:var(--mono);font-size:18px;font-weight:500;color:var(--ink)}
.dc-lbl{font-size:11px;color:var(--ink3);margin-top:2px}
.chart-leg{display:flex;flex-direction:column;gap:6px;width:100%;margin-top:16px;padding-top:14px;border-top:1px solid var(--bd2)}
.cl-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;cursor:pointer;transition:background .1s}
.cl-item:hover{background:var(--sf2)}
.cl-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.cl-name{font-size:12px;font-weight:500;flex:1}
.cl-amt{font-family:var(--mono);font-size:12px;color:var(--ink3)}
.cl-pct{font-family:var(--mono);font-size:11px;color:var(--ink3);min-width:36px;text-align:right}

/* ── INSIGHT ── */
.ins{background:var(--ink);color:#fff;border-radius:var(--r);padding:14px 16px}
.ins-l{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:8px}
.ins-t{font-size:13px;color:rgba(255,255,255,.8);line-height:1.7}
.ins-t strong{color:#fff}
.hi{display:inline-block;background:rgba(255,255,255,.12);border-radius:4px;padding:0 6px;font-family:var(--mono);font-size:12px}
.hi.r{background:rgba(255,100,80,.2);color:#ff8a7a}.hi.g{background:rgba(80,220,130,.15);color:#7de0a4}

.main-empty{padding:40px 20px;text-align:center}
.me-icon{font-size:48px;margin-bottom:16px;opacity:.35}
.me-ttl{font-size:18px;font-weight:600;color:var(--ink3);margin-bottom:8px}
.me-sub{font-size:13px;color:var(--ink3);line-height:1.7}

.spacer{height:32px}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.fade{animation:fadeIn .25s ease}
</style>
</head>

function changeMonth(dir) {
  const next = currentIdx + dir;
  if (next < 0 || next >= MONTHS_ORDER.length) return;
  currentIdx = next;
  activeTab = 'daily';
  renderAll();
}

function renderNav() {
  const key = MONTHS_ORDER[currentIdx];
  const m   = MONTHS[key];
  document.getElementById('mnav-label').textContent = m ? m.label : MONTHS_ORDER[currentIdx].replace('-', ' / ');

  document.getElementById('btn-prev').disabled = currentIdx === 0;
  document.getElementById('btn-next').disabled = currentIdx === MONTHS_ORDER.length - 1;

  const dots = document.getElementById('mnav-dots');
  dots.innerHTML = MONTHS_ORDER.map((k, i) =>
    `<div class="mnav-dot${i===currentIdx?' on':''}" onclick="currentIdx=${i};activeTab='daily';renderAll()"></div>`
  ).join('');
}

  } else {
    const rows = d.srows.filter(r=>r.a!==null);

      h+=`<div class="br"><span class="bl">${r.l}</span><span class="bv"><span class="bb">${r.b.toLocaleString()}</span><span class="ba ${cl}">${r.a.toLocaleString()}</span><span class="bd-v ${cl}">${df>0?'+':''}${df.toLocaleString()}</span></span></div>`;});

    h+=`<div class="br" style="padding-top:6px;margin-top:2px;border-top:1px solid var(--bd)"><span class="bl" style="font-weight:600">รวม</span><span class="bv"><span class="bb">${d.budgetTotal.toLocaleString()}</span><span class="ba ${tc}" style="font-weight:600">${d.actualTotal.toLocaleString()}</span><span class="bd-v ${tc}">${diff>0?'+':''}${diff.toLocaleString()}</span></span></div>`;

  cEl.innerHTML='';
  d.cats.forEach((cat,idx)=>{
    const isSv=d.isSaving, isTr=d.isTransfer;
    const bval=cat.b||cat.a||1;
    const pct=isTr?(cat.a/(d.total||1)*100):(cat.a?Math.min(cat.a/bval*100,100):0);

    const displayAmt=cat.a?`${isTr?'':cat.a>0?'+':'-'}${Math.abs(cat.a).toLocaleString()}`:'—';
    const el=document.createElement('div');
    el.className='cc';el.style.animationDelay=(idx*.04+.02)+'s';
    el.innerHTML=`<div class="cc-h" onclick="this.parentElement.classList.toggle('on')"><span class="cc-i">${cat.i}</span><div class="cc-inf"><div class="cc-n">${cat.n}</div><div class="cc-bar"><div class="cc-f ${cat.f}" style="width:${pct}%"></div></div></div><div class="cc-r"><div class="cc-a ${amtCls}">${displayAmt}</div><div class="cc-b ${biCls}">${biTxt}</div></div><span class="cc-chv">▼</span></div><div class="txl"><div class="tx-h"><span>วันที่ · รายการ</span><span>แหล่ง</span></div>${txH}${subH}</div>`;
    cEl.appendChild(el);
  });
}

// ═══════════════════════════════════════════════════════════════
// DONUT CHART
// ═══════════════════════════════════════════════════════════════
function buildDonut() {
  const key = MONTHS_ORDER[currentIdx];
  const m   = MONTHS[key];
  if (!m) return;
  const CD  = m.chartData;

  const svg=document.getElementById('donut');
  const leg=document.getElementById('cleg');
  if(!svg||!leg) return;

  const cx=120,cy=120,OR=108,OW=26,IR=74,IW=20;
  const total=CD.reduce((s,z)=>s+z.amt,0);
  const C_out=2*Math.PI*OR, C_in=2*Math.PI*IR;
  let outOff=0, paths='', legH='';

  CD.forEach((zone,zi)=>{
    const zFrac=zone.amt/total;
    const zLen_o=zFrac*C_out, zLen_i=zFrac*C_in;
    const pct=Math.round(zFrac*100);
    paths+=`<circle cx="${cx}" cy="${cy}" r="${OR}" fill="none" stroke="${zone.c}" stroke-width="${OW}" stroke-dasharray="${zLen_o-2} ${C_out-(zLen_o-2)}" stroke-dashoffset="${-outOff}" style="cursor:pointer" onmouseenter="hl(${zi},-1,'${key}')" onmouseleave="rst('${key}')"/>`;
    const subTotal=zone.subs.reduce((s,sub)=>s+sub.a,0);
    let inOff=outOff/C_out*C_in;
    zone.subs.forEach(sub=>{
      const sLen=sub.a/subTotal*zLen_i;
      paths+=`<circle cx="${cx}" cy="${cy}" r="${IR}" fill="none" stroke="${sub.c}" stroke-width="${IW}" stroke-dasharray="${sLen-1.5} ${C_in-(sLen-1.5)}" stroke-dashoffset="${-inOff}" style="cursor:pointer" onmouseenter="hl(${zi},'${sub.n}','${key}')" onmouseleave="rst('${key}')"/>`;
      inOff+=sLen;
    });
    outOff+=zLen_o;
    legH+=`<div class="cl-item" onmouseenter="hl(${zi},-1,'${key}')" onmouseleave="rst('${key}')"><div class="cl-dot" style="background:${zone.c}"></div><span class="cl-name">${zone.name}</span><span class="cl-amt">${zone.amt.toLocaleString()} ฿</span><span class="cl-pct">${pct}%</span></div>`;
  });
  paths+=`<circle cx="${cx}" cy="${cy}" r="${IR-IW/2-2}" fill="white"/>`;
  svg.innerHTML=paths;
  leg.innerHTML=legH;
  rst(key);
}
function hl(zi,sub,key){
  const zone=MONTHS[key].chartData[zi];
  if(sub===-1){document.getElementById('dc-amt').textContent=zone.amt.toLocaleString();document.getElementById('dc-lbl').textContent=zone.name;}
  else{const s=zone.subs.find(x=>x.n===sub)||zone.subs[0];document.getElementById('dc-amt').textContent=s.a.toLocaleString();document.getElementById('dc-lbl').textContent=s.n;}
}
function rst(key){
  const total=MONTHS[key].chartData.reduce((s,z)=>s+z.amt,0);
  document.getElementById('dc-amt').textContent=total.toLocaleString();
  document.getElementById('dc-lbl').textContent='จัดสรรรวมทั้งหมด';
}

// ═══════════════════════════════════════════════════════════════
// RENDER ALL
// ═══════════════════════════════════════════════════════════════
function renderAll() {
  const key = MONTHS_ORDER[currentIdx];
  const m   = MONTHS[key];
  renderNav();
  renderHeader(m);
  renderAssets(m);
  renderMain(m);
}

// INIT
renderAll();
